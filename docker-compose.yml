version: "3.9"

services:

  # ── PostgreSQL Database ───────────────────────────────────────────────────────
  db:
    image: postgres:15                  # official PostgreSQL image — no Dockerfile needed
    container_name: webot_db
    restart: always                     # restart if it crashes
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: webot
    ports:
      - "5432:5432"                     # expose to host so pgAdmin still works
    volumes:
      - postgres_data:/var/lib/postgresql/data  # persist data even if container restarts

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .                        # build from project root
      dockerfile: backend/Dockerfile    # use backend Dockerfile
    container_name: webot_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/webot
    depends_on:
      - db                              # wait for db to start before backend starts


    volumes:
      - .:/app    # maps your local folder to container folder

  # ── Streamlit Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .                        # build from project root
      dockerfile: Dockerfile.Frontend   # use frontend Dockerfile
    container_name: webot_frontend
    restart: always
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://backend:8000  # use container name, not localhost
    depends_on:
      - backend                         # wait for backend to start

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:                        # named volume — persists database data